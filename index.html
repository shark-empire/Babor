<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Transfer Admin Panel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }


    body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
        background: linear-gradient(135deg, #0f172a 0%, #0f172a 50%, #1e1b4b 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
        overflow: hidden;
        color: #e2e8f0;
    }

    /* Ambient background effects */
    body::before {
        content: '';
        position: fixed;
        top: -40%;
        right: -40%;
        width: 800px;
        height: 800px;
        background: radial-gradient(circle, rgba(34, 211, 238, 0.1) 0%, transparent 70%);
        border-radius: 50%;
        pointer-events: none;
        z-index: 0;
    }

    body::after {
        content: '';
        position: fixed;
        bottom: -40%;
        left: -40%;
        width: 800px;
        height: 800px;
        background: radial-gradient(circle, rgba(168, 85, 247, 0.1) 0%, transparent 70%);
        border-radius: 50%;
        pointer-events: none;
        z-index: 0;
        filter: blur(80px);
    }

    .container {
        position: relative;
        z-index: 10;
        width: 100%;
        max-width: 420px;
    }

    .card-wrapper {
        position: relative;
    }

    .card-glow {
        position: absolute;
        inset: 0;
        background: linear-gradient(135deg, rgba(34, 211, 238, 0.2) 0%, rgba(168, 85, 247, 0.2) 100%);
        border-radius: 1.5rem;
        filter: blur(20px);
        opacity: 0.8;
        z-index: -1;
    }

    .card {
        background: rgba(15, 23, 42, 0.5);
        backdrop-filter: blur(20px);
        border: 1px solid rgba(34, 211, 238, 0.3);
        border-radius: 1.5rem;
        padding: 2rem;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        position: relative;
    }

    .header {
        margin-bottom: 2rem;
    }

    .title {
        font-size: 1.875rem;
        font-weight: 700;
        background: linear-gradient(135deg, #22d3ee 0%, #60a5fa 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 0.5rem;
    }

    .subtitle {
        color: #94a3b8;
        font-size: 0.875rem;
        line-height: 1.5;
    }

    .form-group {
        margin-bottom: 1.25rem;
    }

    .label {
        display: block;
        font-size: 0.875rem;
        font-weight: 500;
        color: #cbd5e1;
        margin-bottom: 0.5rem;
    }

    input {
        width: 100%;
        padding: 0.75rem 1rem;
        background: rgba(30, 41, 59, 0.5);
        border: 1px solid #475569;
        border-radius: 0.5rem;
        color: #e2e8f0;
        font-size: 1rem;
        transition: all 0.3s ease;
        font-family: inherit;
    }

    input::placeholder {
        color: #64748b;
    }

    input:focus {
        outline: none;
        border-color: #22d3ee;
        box-shadow: 0 0 0 3px rgba(34, 211, 238, 0.1);
        background: rgba(30, 41, 59, 0.8);
    }

    input:disabled {
        opacity: 0.5;
        cursor: not-allowed;
    }

    .button {
        width: 100%;
        margin-top: 1.5rem;
        padding: 0.75rem;
        background: linear-gradient(135deg, #22d3ee 0%, #3b82f6 100%);
        color: #ffffff;
        font-weight: 600;
        font-size: 0.95rem;
        letter-spacing: 0.05em;
        border: none;
        border-radius: 0.5rem;
        cursor: pointer;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        position: relative;
        overflow: hidden;
    }

    .button:hover:not(:disabled) {
        background: linear-gradient(135deg, #06b6d4 0%, #2563eb 100%);
        transform: translateY(-2px);
        box-shadow: 0 10px 25px rgba(34, 211, 238, 0.3);
    }

    .button:active:not(:disabled) {
        transform: scale(0.98);
    }

    .button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
    }

    .spinner {
        width: 16px;
        height: 16px;
        border: 2px solid rgba(255, 255, 255, 0.3);
        border-top-color: #ffffff;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }

    .message {
        margin-top: 1.5rem;
        padding: 1rem;
        border-radius: 0.5rem;
        display: flex;
        gap: 0.75rem;
        font-size: 0.875rem;
        animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
        from {
            opacity: 0;
            transform: translateY(-10px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .error {
        background: rgba(239, 68, 68, 0.1);
        border: 1px solid rgba(239, 68, 68, 0.3);
        color: #fca5a5;
    }

    .success {
        background: rgba(34, 197, 94, 0.1);
        border: 1px solid rgba(34, 197, 94, 0.3);
        color: #86efac;
    }

    .message-icon {
        flex-shrink: 0;
        margin-top: 2px;
    }

    .message-content {
        flex: 1;
    }

    .message-title {
        font-weight: 600;
        margin-bottom: 0.25rem;
    }

    .result-box {
        background: rgba(30, 41, 59, 0.5);
        border: 1px solid #475569;
        border-radius: 0.375rem;
        padding: 0.75rem;
        margin-top: 0.75rem;
        font-family: 'Courier New', monospace;
        font-size: 0.75rem;
        color: #cbd5e1;
        max-height: 150px;
        overflow-y: auto;
        white-space: pre-wrap;
        word-break: break-word;
    }

    .footer {
        margin-top: 1.5rem;
        text-align: center;
        font-size: 0.75rem;
        color: #64748b;
    }

    .hidden {
        display: none;
    }
</style>


</head>
<body>
    <div class="container">
        <div class="card-wrapper">
            <div class="card-glow"></div>
            <div class="card">
                <div class="header">
                    <h1 class="title">Data Transfer</h1>
                    <p class="subtitle">Send data units to any receiver instantly</p>
                </div>

            <div>
                <div class="form-group">
                    <label for="phone" class="label">Receiver Number</label>
                    <input 
                        type="tel" 
                        id="phone" 
                        placeholder="0540000000"
                        aria-label="Receiver phone number"
                    >
                </div>

                <div class="form-group">
                    <label for="amount" class="label">Amount (GB)</label>
                    <input 
                        type="number" 
                        id="amount" 
                        placeholder="1"
                        min="0"
                        step="0.1"
                        aria-label="Data amount in GB"
                    >
                </div>

                <button id="submitBtn" class="button" onclick="handleTransfer()">
                    <span>FIRE DATA</span>
                    <span>→</span>
                </button>
            </div>

            <div id="message" class="message hidden"></div>
            <div id="result" class="result-box hidden"></div>

            <div class="footer">
                Powered by Railway API • Admin Testing Interface
            </div>
        </div>
    </div>
</div>

<script>
    const phoneInput = document.getElementById('phone');
    const amountInput = document.getElementById('amount');
    const submitBtn = document.getElementById('submitBtn');
    const messageDiv = document.getElementById('message');
    const resultDiv = document.getElementById('result');

    // Allow Enter key to submit
    [phoneInput, amountInput].forEach(input => {
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !submitBtn.disabled) {
                handleTransfer();
            }
        });
    });

    function showMessage(text, type) {
        messageDiv.className = `message ${type}`;
        messageDiv.innerHTML = `
            <div class="message-icon">
                ${type === 'error' ? '⚠️' : '✓'}
            </div>
            <div class="message-content">
                <div class="message-title">${type === 'error' ? 'Error' : 'Success'}</div>
                <div>${escapeHtml(text)}</div>
            </div>
        `;
        messageDiv.classList.remove('hidden');
        resultDiv.classList.add('hidden');
    }

    function showResult(data) {
        resultDiv.textContent = JSON.stringify(data, null, 2);
        resultDiv.classList.remove('hidden');
    }

    function validateInputs() {
        const phone = phoneInput.value.trim();
        const amount = amountInput.value;

        if (!phone) {
            showMessage('Receiver number is required', 'error');
            return false;
        }

        if (!/^\d{10,}$/.test(phone)) {
            showMessage('Invalid phone number format', 'error');
            return false;
        }

        if (!amount || parseFloat(amount) <= 0) {
            showMessage('Amount must be greater than 0', 'error');
            return false;
        }

        return true;
    }

    function escapeHtml(text) {
        const map = {
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;',
            "'": '&#039;'
        };
        return String(text).replace(/[&<>"']/g, m => map[m]);
    }

    async function handleTransfer() {
        messageDiv.classList.add('hidden');

        if (!validateInputs()) return;

        submitBtn.disabled = true;
        submitBtn.innerHTML = '<div class="spinner"></div><span>Processing...</span>';

        try {
            const response = await fetch(
                'https://mtn-data-aggregator-production.up.railway.app/api/v1/transfer',
                {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        receiverMsisdn: phoneInput.value,
                        transferAmount: amountInput.value,
                        paystackReference: `SFapi_${Date.now()}`,
                        role: 'admin',
                        type: 'DATA'
                    })
                }
            );

            if (!response.ok) {
                throw new Error(`HTTP ${response.status}: ${response.statusText}`);
            }

            const result = await response.json();
            messageDiv.className = 'message success';
            messageDiv.innerHTML = `
                <div class="message-icon">✓</div>
                <div class="message-content">
                    <div class="message-title">Transfer Successful</div>
                </div>
            `;
            messageDiv.classList.remove('hidden');
            showResult(result);
        } catch (err) {
           console.error(err); // This will show the real error in the browser console
showMessage('Connection failed. Check browser console (F12) for CORS errors.', 'error'); 
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerHTML = '<span>FIRE DATA</span><span>→</span>';
        }
    }
</script>

</body>
</html>
